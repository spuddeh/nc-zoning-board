name: Apply Z/Yaw from Migration Project

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:        # Manual trigger

jobs:
  apply-z:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply Z/Yaw data from project
        id: apply
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECTS_PAT }}
        run: node scripts/apply_z_from_project.js

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet data/locations/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Rebuild mods.json
        if: steps.changes.outputs.changed == 'true'
        run: node scripts/build_mods.js

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.ACTIONS_PAT }}
          branch: data/z-yaw-batch-${{ github.run_number }}
          commit-message: "data: backfill Z and Yaw coordinates (batch ${{ github.run_number }})"
          title: "data: backfill Z and Yaw coordinates (batch ${{ github.run_number }})"
          body: |
            Automated batch update from the [Z/Yaw migration project](https://github.com/users/spuddeh/projects/3).

            Updates `coordinates` to `[X, Y, Z]` and adds `yaw` for all locations marked **Done** in the project.

            <!-- apply_z_batch -->
          labels: data-update
