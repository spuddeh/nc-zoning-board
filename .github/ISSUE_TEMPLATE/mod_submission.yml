name: 📍 Submit a New Mod Location
description: Register your mod's coordinates on the NC Zoning Board map to prevent overlaps.
title: "[Mod Submission]: "
labels: ["mod-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for adding your mod to the NC Zoning Board! Please fill out the details below. Our bot will automatically verify your coordinates and generate a Pull Request to add your pin to the live map.
  - type: input
    id: mod_name
    attributes:
      label: Mod Name
      description: The exact title of your location mod.
      placeholder: "e.g., Modular Apartment Makeover - The Glen"
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Author Alias(es)
      description: |
        The name(s) you want displayed. Multiple authors should be separated by commas.
        IMPORTANT: These must EXACTLY match your Nexus Mods username for profile linking to work.
      placeholder: "e.g., Spuddeh, Kaoziun"
    validations:
      required: true
  - type: input
    id: credits
    attributes:
      label: Credits
      description: Additional credits for teams, contributors, or assets (optional).
      placeholder: "e.g., CRF Team"
  - type: input
    id: coord_x
    attributes:
      label: X Coordinate
      description: The exact X coordinate from Cyber Engine Tweaks output (first value shown).
      placeholder: "e.g., 500"
    validations:
      required: true
  - type: input
    id: coord_y
    attributes:
      label: Y Coordinate
      description: The exact Y coordinate from Cyber Engine Tweaks output (second value shown).
      placeholder: "e.g., -1200"
    validations:
      required: true
  - type: input
    id: nexus_link
    attributes:
      label: Nexus Mods Link
      description: |
        The full URL to your published mod page.
        If the mod isn't published yet, type 'WIP'. If submitting a test location, type 'Dummy'.
      placeholder: "https://www.nexusmods.com/cyberpunk2077/mods/... or WIP"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What type of location mod is this?
      options:
        - location-overhaul
        - new-location
        - other
    validations:
      required: true
  - type: input
    id: tags
    attributes:
      label: Tags
      description: "Comma-separated tags (styles, life-paths, or utilities). Refer to data/tags.json for valid tags."
      placeholder: "e.g., apartment, neokitsch, corpo"
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Short Description
      description: A brief, 1-2 sentence summary of what your mod adds to this location.
      placeholder: "Custom synthwave aesthetic overhaul for the Glen apartment..."
    validations:
      required: true
