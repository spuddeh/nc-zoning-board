<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CP2077 Terrain 3D Renderer</title>
  <style>
    body { margin: 0; background: #0a1623; color: #e0e0e0; font-family: monospace; }
    #canvas { display: block; }
    #info {
      position: fixed; top: 10px; left: 10px;
      background: rgba(0,0,0,0.7); padding: 10px; border-radius: 4px;
      font-size: 12px; line-height: 1.6; z-index: 10;
    }
    #controls {
      position: fixed; top: 10px; right: 10px;
      background: rgba(0,0,0,0.7); padding: 10px; border-radius: 4px;
      font-size: 12px; z-index: 10; display: flex; flex-direction: column; gap: 6px;
    }
    button {
      background: #1a3a5c; color: #00f0ff; border: 1px solid #00f0ff;
      padding: 6px 12px; cursor: pointer; border-radius: 3px; font-family: monospace;
    }
    button:hover { background: #00f0ff; color: #0a1623; }
    label { display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="info">
  <b>CP2077 3D Map Renderer</b><br>
  Viewing from above (orthographic top-down)<br>
  Axis: GLB_X → CET_X (east), GLB_Z → CET_Y (north), GLB_Y → height<br>
  <br>
  World: X[-5500, 6050] Y[-7300, 5000]<br>
  <span id="status">Loading...</span>
</div>
<div id="controls">
  <label><input type="checkbox" id="showTerrain" checked> Terrain</label>
  <label><input type="checkbox" id="showWater" checked> Water</label>
  <label><input type="checkbox" id="showCliffs" checked> Cliffs</label>
  <label><input type="checkbox" id="showHillshade" checked> Hillshade</label>
  <label><input type="checkbox" id="showMarkers" checked> Reference markers</label>
  <button onclick="exportPNG()">Export PNG (current view)</button>
</div>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// ── World constants (from Realistic Map mod terrain quad UVs) ────────────
// The mod's 4-vertex quad defines the exact satellite image projection.
const WORLD_MIN_X = -6298, WORLD_MAX_X = 5815;
const WORLD_MIN_Y = -7684, WORLD_MAX_Y = 4427;
const WORLD_W = WORLD_MAX_X - WORLD_MIN_X;   // 11550
const WORLD_H = WORLD_MAX_Y - WORLD_MIN_Y;   // 12300
const WORLD_CX = (WORLD_MIN_X + WORLD_MAX_X) / 2;  // 275
const WORLD_CY = (WORLD_MIN_Y + WORLD_MAX_Y) / 2;  // -1150

// ── Base tile colors ──────────────────────────────────────────────────────
// Neutral dark grey — theme-agnostic, won't compete with any overlay accent.
// These are the PERMANENT base tile colours (can't be changed per theme).
const COLOR_TERRAIN  = new THREE.Color(45/255,  48/255,  55/255);   // #2d3037
const COLOR_WATER    = new THREE.Color(25/255,  35/255,  50/255);   // #192332
const COLOR_CLIFFS   = new THREE.Color(40/255,  43/255,  50/255);   // slightly darker than terrain
const COLOR_BG       = new THREE.Color(0, 0, 0);

// Hillshade — sun from NW in CET space (-1, 1, 1.5) converted to GLB/Three.js space:
//   GLB_X = CET_X, GLB_Y = CET_Z (up), GLB_Z = -CET_Y (south)
// So CET(-1, 1, 1.5) → GLB(-1, 1.5, -1)
// NOTE: The game's terrain shader (3d_map_terrain.mt) uses edge-darkening (DarkEdgeWidth)
// rather than a true directional light. Our Lambert approximation is visually similar.
const SUN_DIR = new THREE.Vector3(-1, 1.5, -1).normalize();
const AMBIENT = 0.35;

// ── GLB paths ─────────────────────────────────────────────────────────────
// Served via: npx serve D:/ -p 3001 (from the D drive root)
// Then open: http://localhost:3001/Modding/cp2077-location-mods-map/scripts/render_terrain_3d.html
const GLB_BASE = '/Modding/CP2077%20Mods/MyMods/map_data_export/source/raw/base/entities/cameras/3dmap/';

// ── Setup ─────────────────────────────────────────────────────────────────
const canvas  = document.getElementById('canvas');
const W = window.innerWidth, H = window.innerHeight;
canvas.width  = W;
canvas.height = H;

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, preserveDrawingBuffer: true });
renderer.setSize(W, H);
renderer.setClearColor(COLOR_BG);
renderer.shadowMap.enabled = false;

// Orthographic camera looking straight down
// Aspect ratio of world: 11550 / 12300 = 0.9390
const aspect = W / H;
const frustumH = WORLD_H / 2;
const frustumW = frustumH * aspect;

const camera = new THREE.OrthographicCamera(
  -frustumW, frustumW,
   frustumH, -frustumH,
  -50000, 50000
);
// Position camera above the world centre, looking down (–Y in Three default)
// In GLB space: CET_X=+GLB_X, CET_Y=+GLB_Z, height=+GLB_Y
// Camera above = high Y, looking down the -Y axis, up = +Z
camera.position.set(WORLD_CX, 10000, -WORLD_CY);  // note Z negated (GLB_Z = -CET_Y)
camera.lookAt(WORLD_CX, 0, -WORLD_CY);
camera.up.set(0, 0, -1);  // north = -Z in GLB space
camera.updateProjectionMatrix();

const scene = new THREE.Scene();

// ── Helpers ───────────────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function makeHillshadedMaterial(baseColor) {
  return new THREE.MeshLambertMaterial({
    color: baseColor,
    side: THREE.DoubleSide,
    flatShading: true,
  });
}

function makeFlatMaterial(baseColor) {
  return new THREE.MeshBasicMaterial({ color: baseColor, side: THREE.DoubleSide });
}

// ── Load terrain GLB ──────────────────────────────────────────────────────
const loader = new GLTFLoader();
const meshes = {};

async function loadGlb(url, label) {
  return new Promise((resolve, reject) => {
    loader.load(url, gltf => {
      setStatus(`Loaded: ${label}`);
      resolve(gltf.scene);
    }, xhr => {
      const pct = xhr.total ? Math.round(xhr.loaded / xhr.total * 100) : '?';
      setStatus(`Loading ${label}... ${pct}%`);
    }, reject);
  });
}

function applyMaterialToScene(scene3d, material) {
  scene3d.traverse(obj => {
    if (obj.isMesh) {
      obj.material = material;
      obj.castShadow = false;
      obj.receiveShadow = false;
    }
  });
}

// Sun light for hillshading
const dirLight = new THREE.DirectionalLight(0xffffff, 1.0 - AMBIENT);
dirLight.position.copy(SUN_DIR);
scene.add(dirLight);
const ambLight = new THREE.AmbientLight(0xffffff, AMBIENT);
scene.add(ambLight);

// Load all GLBs
// Note: these URLs only work when served via a local HTTP server.
// Run: npx serve . in the repo root, then open this file from there.
// Alternatively, update GLB_BASE to use /path served by the dev server.
Promise.all([
  loadGlb(GLB_BASE + '3dmap_terrain.glb',  'terrain').then(s => { meshes.terrain = s; }),
  loadGlb(GLB_BASE + '3dmap_water.glb',    'water').then(s   => { meshes.water = s;   }),
  loadGlb(GLB_BASE + '3dmap_cliffs.glb',   'cliffs').then(s  => { meshes.cliffs = s;  }),
]).then(() => {
  // Terrain — identity transform, flat shading with hillshade
  applyMaterialToScene(meshes.terrain, makeHillshadedMaterial(COLOR_TERRAIN));
  scene.add(meshes.terrain);

  // Water — confirmed Y=-1.0 in GLB. No position offset needed.
  // Terrain faces above sea level will occlude it via the Z-buffer.
  applyMaterialToScene(meshes.water, makeFlatMaterial(COLOR_WATER));
  scene.add(meshes.water);

  // Cliffs — Dogtown cliff faces only (not general terrain).
  // Entity localTransform: pos(-2255, -3050) CET → GLB offset (X=-2255, Z=+3050)
  // Parent: ep1_dogtown_data (chain not fully resolved — direct offset for now)
  applyMaterialToScene(meshes.cliffs, makeHillshadedMaterial(COLOR_CLIFFS));
  meshes.cliffs.position.set(-2255, 0, 3050);
  scene.add(meshes.cliffs);

  setStatus('Ready — all meshes loaded');
  render();
}).catch(err => {
  setStatus(`Error: ${err.message}`);
  console.error(err);
});

function render() {
  requestAnimationFrame(render);

  // Toggle visibility
  if (meshes.terrain) meshes.terrain.visible = document.getElementById('showTerrain').checked;
  if (meshes.water)   meshes.water.visible   = document.getElementById('showWater').checked;
  if (meshes.cliffs)  meshes.cliffs.visible  = document.getElementById('showCliffs').checked;
  markerGroup.visible = document.getElementById('showMarkers').checked;

  // Hillshade toggle — swap between lit (Lambert) and flat (Basic) on terrain/cliffs
  const hillshadeOn = document.getElementById('showHillshade').checked;
  dirLight.visible = hillshadeOn;
  // Ambient always on; directional light provides the hillshade variation

  renderer.render(scene, camera);
}

// ── Reference markers ────────────────────────────────────────────────────
// Known CET (X, Y) → GLB (X, Y=?, Z=-Y). Height (Y) set to 50 to float above terrain.
// Toggle with the "Markers" checkbox.
const LANDMARKS = [
  { name: 'Afterlife',         cetX: -1580, cetY:  1160 },
  { name: 'Konpeki Plaza',     cetX: -1640, cetY:  1680 },
  { name: 'MB H10 (Haymarket)',cetX:  -735, cetY:  1500 },
  { name: 'Pacifica',          cetX: -2550, cetY: -1900 },
  { name: 'Rancho Coronado',   cetX:   350, cetY: -1750 },
  { name: 'North Oak',         cetX:   650, cetY:  1900 },
  { name: 'Arasaka HQ',        cetX: -1580, cetY:   120 },
];

const markerGroup = new THREE.Group();
const markerGeo = new THREE.SphereGeometry(80, 8, 8);
const markerMat = new THREE.MeshBasicMaterial({ color: 0xff3e34 });

LANDMARKS.forEach(lm => {
  const mesh = new THREE.Mesh(markerGeo, markerMat);
  // GLB space: X=CET_X, Y=height above terrain, Z=-CET_Y
  mesh.position.set(lm.cetX, 200, -lm.cetY);
  markerGroup.add(mesh);
});
scene.add(markerGroup);

// ── PNG Export ────────────────────────────────────────────────────────────
window.exportPNG = function() {
  renderer.render(scene, camera);
  const url = canvas.toDataURL('image/png');
  const a = document.createElement('a');
  a.href = url;
  a.download = 'terrain_preview.png';
  a.click();
};
</script>
</body>
</html>
