name: 🔄 Suggest a Modification or Removal
description: Request an update, edit, or removal of an existing map pin.
labels: ["mod-modification"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form to suggest changes to an existing map entry.
        **Location ID is read-only — do not modify it.**
  - type: input
    id: location_id
    attributes:
      label: Location ID
      description: The unique UUID for this location file. DO NOT EDIT.
    validations:
      required: true
  - type: dropdown
    id: action_type
    attributes:
      label: Action Requested
      description: Are you suggesting an update to existing data, or requesting the pin be removed?
      options:
        - Edit / Update
        - Removal
    validations:
      required: true
  - type: input
    id: mod_name
    attributes:
      label: Mod Name
      description: The exact title of the mod.
    validations:
      required: true
  - type: input
    id: authors
    attributes:
      label: Author(s)
      description: Comma-separated list of authors.
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        ### Getting Your Coordinates
        Coordinates must come from **Cyber Engine Tweaks (CET)** — do **not** use World Builder coordinates, as they may place your pin in the wrong location.

        **Option 1 — CET Console:**
        1. Stand at the location in-game
        2. Open the CET console (`~`)
        3. Run: `local p,r = GetPlayer():GetWorldPosition(), GetPlayer():GetWorldOrientation():ToEulerAngles(); print(string.format("x=%.4f  y=%.4f  z=%.4f  yaw=%.4f", p.x, p.y, p.z, r.yaw))`
        4. Note the **X**, **Y**, **Z**, and **Yaw** values from the output

        **Option 2 — Simple Location Manager:**
        Install [Simple Location Manager](https://www.nexusmods.com/cyberpunk2077/mods/26454), save the location, then read the X, Y, Z from the saved entry. The BBCode Generator modal on the NC Zoning Board website also has this command ready to copy.
  - type: input
    id: coord_x
    attributes:
      label: X Coordinate
      description: Required for updates. **Include the minus sign if the value is negative**. Leave blank if requesting removal.
  - type: input
    id: coord_y
    attributes:
      label: Y Coordinate
      description: Required for updates. **Include the minus sign if the value is negative**. Leave blank if requesting removal.
  - type: input
    id: coord_z
    attributes:
      label: Z Coordinate
      description: Height/elevation. Leave blank to keep the existing value or if requesting removal.
  - type: input
    id: yaw
    attributes:
      label: Yaw (Facing Direction)
      description: Optional. Player facing direction in degrees. Leave blank to keep the existing value.
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Leave as "Keep existing" if the category is not changing.
      options:
        - Keep existing
        - location-overhaul
        - new-location
        - other
    validations:
      required: true
  - type: input
    id: credits
    attributes:
      label: Credits
      description: Additional credits (optional).
  - type: markdown
    attributes:
      value: |
        **Tags** — check all that apply. Leave all unchecked to keep the existing tags.
        > Style tags describe the aesthetic. Life-path tags describe who the mod suits. Utility tags describe the function.
  - type: checkboxes
    id: tags
    attributes:
      label: Tags
      options:
        - label: "apartment — A player housing unit within a megabuilding or high-rise"
        - label: "corpo — High-end corporate architecture and security-focused areas"
        - label: "entertainment — Bars, clubs, casinos, and nightlife venues"
        - label: "entropism — The poverty aesthetic of struggling against technology"
        - label: "house — A standalone player dwelling or safehouse"
        - label: "infrastructure — Roads, bridges, parking structures, and public works"
        - label: "kitsch — Flashy, bold, cheap — the look of a lost golden age"
        - label: "neokitsch — Synonymous with luxury and infinite wealth"
        - label: "neomilitarism — Cold, sharp, modern — ready for combat"
        - label: "nomad — Off-the-grid, scrapyard, desert, or vehicular habitats"
        - label: "photos — Scenic or atmospheric locations suited for virtual photography"
        - label: "quest — A location tied to custom gigs, missions, or storylines"
        - label: "shop — A retail location for weapons, clothing, or items"
        - label: "streetkid — Gang culture, neon lights, and urban survival"
  - type: input
    id: nexus_link
    attributes:
      label: Nexus Mods Link
      description: The URL to the mod page (or 'WIP'/'Dummy'). Leave blank to keep existing.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: |
        Leave this blank to keep the existing description.
        Only fill this out if you are suggesting a rewritten description.
