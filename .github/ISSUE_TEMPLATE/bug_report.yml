name: 🐛 Report a Bug
description: Report an issue with the NC Zoning Board map interface, data, or functionality.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue! Please provide as much detail as possible so we can fix it quickly.
  - type: input
    id: bug_summary
    attributes:
      label: Bug Summary
      description: A concise description of what the bug is.
      placeholder: "e.g., The search bar doesn't filter tags correctly on mobile."
    validations:
      required: true
  - type: textarea
    id: reproduction_steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error.
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser / Environment
      description: What browser or device were you using?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Mobile (iOS/Android)
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Context
      description: Add any related screenshots, error logs, or context here.
