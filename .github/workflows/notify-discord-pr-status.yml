name: Notify Discord on PR Status

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  notify:
    # Only run for mod submission PRs (branch name starts with add-mod-)
    if: startsWith(github.event.pull_request.head.ref, 'add-mod-')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord - Merged
        if: github.event.pull_request.merged == true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"✅ Mod Approved: $PR_TITLE\",
                \"description\": \"The submission has been merged — the pin is now live on the map!\",
                \"color\": 5763719,
                \"fields\": [
                  { \"name\": \"PR\", \"value\": \"[$PR_TITLE]($PR_URL)\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"NC Zoning Board\" }
              }]
            }"

      - name: Notify Discord - Closed without merge
        if: github.event.pull_request.merged == false
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"❌ Submission Closed: $PR_TITLE\",
                \"description\": \"The PR was closed without merging. The submission was not added to the map.\",
                \"color\": 15548997,
                \"fields\": [
                  { \"name\": \"PR\", \"value\": \"[$PR_TITLE]($PR_URL)\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"NC Zoning Board\" }
              }]
            }"
