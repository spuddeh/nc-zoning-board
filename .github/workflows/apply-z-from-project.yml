name: Apply Z/Yaw from Migration Project

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:        # Manual trigger

jobs:
  apply-z:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply Z/Yaw data from project
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECTS_PAT }}
        run: node scripts/apply_z_from_project.js

      - name: Check for changes
        id: changes
        run: git diff --quiet data/locations/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Rebuild mods.json
        if: steps.changes.outputs.changed == 'true'
        run: node scripts/build_mods.js

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.ACTIONS_PAT }}
          commit-message: "data: backfill Z and Yaw coordinates (batch ${{ github.run_number }})"
          title: "data: backfill Z and Yaw coordinates (batch ${{ github.run_number }})"
          body: "Automated Z and Yaw coordinate backfill from migration project."
          branch: z-yaw-backfill-${{ github.run_number }}
          delete-branch: true

      - name: Auto-merge PR
        if: steps.changes.outputs.changed == 'true' && steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --squash --auto
