name: Apply Z/Yaw from Migration Project

on:
  schedule:
    - cron: '0 6 * * *'   # Daily at 06:00 UTC
  workflow_dispatch:        # Manual trigger

jobs:
  apply-z:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Apply Z/Yaw data from project
        env:
          GITHUB_TOKEN: ${{ secrets.PROJECTS_PAT }}
        run: node scripts/apply_z_from_project.js

      - name: Check for changes
        id: changes
        run: git diff --quiet data/locations/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Rebuild mods.json
        if: steps.changes.outputs.changed == 'true'
        run: node scripts/build_mods.js

      - name: Commit and push to main
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/locations/
          git commit -m "data: backfill Z and Yaw coordinates (batch ${{ github.run_number }})"
          git push origin main
