name: Validate Mod Data

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'data/locations/**.json'
      - 'data/tags.json'
      - 'mods.schema.json'
  push:
    branches: [ main ]
    paths:
      - 'data/locations/**.json'
      - 'data/tags.json'
      - 'mods.schema.json'

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build mods.json
        run: node scripts/build_mods.js

      - name: Validate JSON Schema against Data
        run: npx -y ajv-cli validate -s mods.schema.json -d mods.json

      - name: Validate Tags consistency
        run: node scripts/validate_tags.js
