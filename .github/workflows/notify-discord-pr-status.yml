name: Notify Discord on PR Status

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  # For new submissions: edit the existing Discord message that was posted when the issue was created
  notify-submission:
    if: startsWith(github.event.pull_request.head.ref, 'add-mod-')
    runs-on: ubuntu-latest
    steps:
      - name: Find Discord Message ID
        id: find_message
        uses: actions/github-script@v7
        with:
          script: |
            // Parse issue number from PR body ("Closes #N")
            const body = context.payload.pull_request.body || '';
            const issueMatch = body.match(/Closes #(\d+)/);
            if (!issueMatch) {
              console.log('No issue reference found in PR body');
              return;
            }
            const issueNumber = parseInt(issueMatch[1]);
            console.log(`Found issue #${issueNumber}`);

            // Search issue comments for the hidden Discord message ID
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100
            });

            for (const comment of comments.data) {
              const idMatch = comment.body.match(/<!--\s*discord_message_id:\s*(\d+)\s*-->/);
              if (idMatch) {
                console.log(`Found Discord message ID: ${idMatch[1]}`);
                core.setOutput('message_id', idMatch[1]);
                return;
              }
            }
            console.log('Discord message ID not found in issue comments');

      - name: Edit Discord Message - Merged
        if: github.event.pull_request.merged == true && steps.find_message.outputs.message_id != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MESSAGE_ID: ${{ steps.find_message.outputs.message_id }}
        run: |
          WEBHOOK_ID=$(echo "$DISCORD_WEBHOOK_URL" | sed 's|.*/webhooks/||' | cut -d'/' -f1)
          WEBHOOK_TOKEN=$(echo "$DISCORD_WEBHOOK_URL" | sed 's|.*/webhooks/[0-9]*/||')
          curl -s -X PATCH "https://discord.com/api/webhooks/$WEBHOOK_ID/$WEBHOOK_TOKEN/messages/$MESSAGE_ID" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"📍 $PR_TITLE\",
                \"description\": \"A new mod location has been submitted and a PR is ready for review.\",
                \"color\": 5763719,
                \"fields\": [
                  { \"name\": \"PR\", \"value\": \"[$PR_TITLE]($PR_URL)\", \"inline\": false },
                  { \"name\": \"Status\", \"value\": \"✅ Approved — pin is now live!\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"NC Zoning Board\" }
              }]
            }"

      - name: Edit Discord Message - Closed without merge
        if: github.event.pull_request.merged == false && steps.find_message.outputs.message_id != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          MESSAGE_ID: ${{ steps.find_message.outputs.message_id }}
        run: |
          WEBHOOK_ID=$(echo "$DISCORD_WEBHOOK_URL" | sed 's|.*/webhooks/||' | cut -d'/' -f1)
          WEBHOOK_TOKEN=$(echo "$DISCORD_WEBHOOK_URL" | sed 's|.*/webhooks/[0-9]*/||')
          curl -s -X PATCH "https://discord.com/api/webhooks/$WEBHOOK_ID/$WEBHOOK_TOKEN/messages/$MESSAGE_ID" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"📍 $PR_TITLE\",
                \"description\": \"A new mod location has been submitted and a PR is ready for review.\",
                \"color\": 15548997,
                \"fields\": [
                  { \"name\": \"PR\", \"value\": \"[$PR_TITLE]($PR_URL)\", \"inline\": false },
                  { \"name\": \"Status\", \"value\": \"❌ Closed without merging\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"NC Zoning Board\" }
              }]
            }"

  # For modifications/removals: post a new Discord message with the final status
  notify-modification:
    if: startsWith(github.event.pull_request.head.ref, 'mod-mod-')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Discord - Merged
        if: github.event.pull_request.merged == true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔄 $PR_TITLE\",
                \"color\": 5763719,
                \"fields\": [
                  { \"name\": \"PR\", \"value\": \"[$PR_TITLE]($PR_URL)\", \"inline\": false },
                  { \"name\": \"Status\", \"value\": \"✅ Applied — map updated!\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"NC Zoning Board\" }
              }]
            }"

      - name: Notify Discord - Closed without merge
        if: github.event.pull_request.merged == false
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔄 $PR_TITLE\",
                \"color\": 15548997,
                \"fields\": [
                  { \"name\": \"PR\", \"value\": \"[$PR_TITLE]($PR_URL)\", \"inline\": false },
                  { \"name\": \"Status\", \"value\": \"❌ Closed without merging\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"NC Zoning Board\" }
              }]
            }"
