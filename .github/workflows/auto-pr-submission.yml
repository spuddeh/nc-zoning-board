name: Auto-Generate Mod PR

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-pr:
    if: contains(github.event.issue.labels.*.name, 'mod-submission')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse Issue and Update JSON
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.issue.body;
            console.log('--- Raw Issue Body ---');
            console.log(body);
            console.log('--- End Body ---');

            // Helper to extract markdown form values
            const extract = (field) => {
              const regex = new RegExp(`### ${field}\\s+([^#]+)`, 'i');
              const match = body.match(regex);
              const value = match ? match[1].trim() : '';
              console.log(`Extracted "${field}": "${value}"`);
              return value;
            };

            const modName = extract('Mod Name');
            const author = extract('Author Alias');
            const coordYRaw = extract('Y Coordinate');
            const coordXRaw = extract('X Coordinate');
            const nexusLink = extract('Nexus Mods Link');
            const category = extract('Category') || 'other';

            // Handle description which might be multiline (last field, no next ###)
            let description = '';
            const descRegex = /### Short Description\s+([\s\S]+)/i;
            const descMatch = body.match(descRegex);
            if(descMatch) {
              description = descMatch[1].replace(/_No response_/, "").trim();
            }
            console.log(`Extracted "Short Description": "${description}"`);
            console.log(`Extracted "Category": "${category}"`);

            if (!modName) {
              core.setFailed('Could not parse "Mod Name" from issue body.');
              return;
            }

            const coordY = parseFloat(coordYRaw);
            const coordX = parseFloat(coordXRaw);

            if (isNaN(coordY) || isNaN(coordX)) {
              core.setFailed(`Invalid coordinates: Y="${coordYRaw}", X="${coordXRaw}"`);
              return;
            }

            // Generate a unique ID (UUID v4)
            const { randomUUID } = require('crypto');
            const id = randomUUID();

            // Always read the latest mods.json from origin/main to avoid stale data
            // when multiple issues are submitted in quick succession
            const { execSync } = require('child_process');
            execSync('git fetch origin main');
            execSync('git checkout origin/main -- mods.json');

            const fs = require('fs');
            const mods = JSON.parse(fs.readFileSync('mods.json', 'utf8'));

            const newMod = {
              id,
              name: modName,
              author,
              coordinates: [coordX, coordY],
              nexus_link: nexusLink,
              description,
              category
            };


            console.log('New mod entry:', JSON.stringify(newMod, null, 2));

            mods.push(newMod);
            console.log(`Added new mod with UUID ${id} (total: ${mods.length})`);

            fs.writeFileSync('mods.json', JSON.stringify(mods, null, 4) + '\n');
            console.log('mods.json written successfully');

            // Pass the mod name to the next step
            core.setOutput('mod_name', modName);

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.ACTIONS_PAT }}
          commit-message: "data: add new mod location - ${{ steps.parse.outputs.mod_name }}"
          title: "Add Mod Location: ${{ steps.parse.outputs.mod_name }}"
          body: "Automated PR created from issue #${{ github.event.issue.number }}.\n\nCloses #${{ github.event.issue.number }}"
          branch: "add-mod-${{ github.event.issue.number }}"
          delete-branch: true

      - name: Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 Beep boop! I have automatically parsed your coordinates and created a Pull Request. Once a maintainer reviews and merges it, your pin will go live!'
            });

      - name: Notify Discord
        id: discord_notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MOD_NAME: ${{ steps.parse.outputs.mod_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          PR_URL: https://github.com/${{ github.repository }}/pulls
        run: |
          RESPONSE=$(curl -s -X POST "$DISCORD_WEBHOOK_URL?wait=true" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"📍 New Mod Submission: $MOD_NAME\",
                \"description\": \"A new mod location has been submitted and a PR is ready for review.\",
                \"color\": 16767242,
                \"fields\": [
                  { \"name\": \"Issue\", \"value\": \"[#$ISSUE_NUMBER]($ISSUE_URL)\", \"inline\": true },
                  { \"name\": \"Pull Requests\", \"value\": \"[Review PRs]($PR_URL)\", \"inline\": true },
                  { \"name\": \"Status\", \"value\": \"⏳ Awaiting review\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"NC Zoning Board\" }
              }]
            }")
          MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "message_id=$MESSAGE_ID" >> $GITHUB_OUTPUT

      - name: Store Discord Message ID on Issue
        uses: actions/github-script@v7
        with:
          script: |
            const messageId = '${{ steps.discord_notify.outputs.message_id }}';
            if (messageId && messageId !== 'null') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `<!-- discord_message_id: ${messageId} -->`
              });
            }
