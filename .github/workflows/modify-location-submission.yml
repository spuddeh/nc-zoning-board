name: Auto-Process Mod Modification
on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  process-modification:
    if: github.event.label.name == 'mod-modification'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTIONS_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Process Issue
        id: process
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const body = context.payload.issue.body;

            const extract = (field) => {
              const regex = new RegExp(`### ${field}\\s+([^#]+)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : '';
            };

            const locationId = extract('Location ID');
            const actionType = extract('Action Requested');
            const modName = extract('Mod Name');
            const authorsRaw = extract('Author\\(s\\)');
            const coordXRaw = extract('X Coordinate');
            const coordYRaw = extract('Y Coordinate');
            const nexusLink = extract('Nexus Mods Link');
            const credits = extract('Credits');
            const categoryRaw = extract('Category');
            const tagsRaw = extract('Tags');

            // Extraction for description (textarea)
            const descRegex = /### Description\s+([\s\S]+?)(?=###|$)/i;
            const descMatch = body.match(descRegex);
            let description = descMatch ? descMatch[1].trim() : '';
            if (description.toLowerCase().includes('_no response_')) description = '';

            if (!locationId) {
              core.setFailed('Missing Location ID.');
              return;
            }

            const filePath = `data/locations/${locationId}.json`;
            const isRemoval = actionType.toLowerCase().includes('removal');

            if (isRemoval) {
              if (fs.existsSync(filePath)) {
                fs.unlinkSync(filePath);
                console.log(`Deleted ${filePath}`);
                core.setOutput('action', 'removal');
                core.setOutput('mod_name', modName || locationId);
              } else {
                core.setFailed(`File ${filePath} not found for removal.`);
                return;
              }
            } else {
              // Edit/Update Logic
              if (!fs.existsSync(filePath)) {
                 core.setFailed(`File ${filePath} not found for update.`);
                 return;
              }

              const existingData = JSON.parse(fs.readFileSync(filePath, 'utf8'));
              
              // Prepare new data
              const coordX = parseFloat(coordXRaw);
              const coordY = parseFloat(coordYRaw);
              if (isNaN(coordX) || isNaN(coordY)) {
                core.setFailed(`Invalid coordinates: X=${coordXRaw}, Y=${coordYRaw}`);
                return;
              }

              let nexusId = existingData.nexus_id;
              if (nexusLink) {
                if (nexusLink.toLowerCase().includes('nexusmods.com/cyberpunk2077/mods/')) {
                  const nexusMatch = nexusLink.match(/\/mods\/(\d+)/);
                  if (nexusMatch) nexusId = nexusMatch[1];
                } else if (nexusLink.toLowerCase().includes('wip')) {
                  nexusId = 'WIP';
                } else if (nexusLink.toLowerCase().includes('dummy')) {
                  nexusId = 'Dummy';
                }
              }

              const authors = authorsRaw ? authorsRaw.split(',').map(a => a.trim()).filter(a => a) : existingData.authors;

              // Tags are submitted as checkboxes: extract tag name (before " — ") from checked lines
              const checkedTags = (tagsRaw.match(/- \[x\] ([^\n—]+)/gi) || [])
                .map(m => m.replace(/- \[x\] /i, '').split(' — ')[0].trim().toLowerCase())
                .filter(t => t);
              const tags = checkedTags.length > 0 ? checkedTags : existingData.tags;

              // Only update category if the submitter chose a real value (not "Keep existing")
              const VALID_CATEGORIES = ['location-overhaul', 'new-location', 'other'];
              const category = (categoryRaw && VALID_CATEGORIES.includes(categoryRaw))
                ? categoryRaw
                : existingData.category;

              const updatedMod = {
                id: locationId,
                name: modName || existingData.name,
                authors: authors,
                credits: credits || existingData.credits || '',
                coordinates: [coordX, coordY],
                nexus_id: nexusId,
                description: description || existingData.description,
                category: category,
                tags: tags
              };

              // Basic Validation against schema logic could go here
              // For now we write it back
              fs.writeFileSync(filePath, JSON.stringify(updatedMod, null, 4) + '\n');
              console.log(`Updated ${filePath}`);
              core.setOutput('action', 'update');
              core.setOutput('mod_name', updatedMod.name);
            }

      - name: Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.ACTIONS_PAT }}
          commit-message: "data: ${{ steps.process.outputs.action }} mod - ${{ steps.process.outputs.mod_name }}"
          title: "${{ steps.process.outputs.action == 'removal' && 'Remove' || 'Update' }} Mod: ${{ steps.process.outputs.mod_name }}"
          body: "Automated PR created from issue #${{ github.event.issue.number }}.\n\nCloses #${{ github.event.issue.number }}"
          branch: "mod-mod-${{ github.event.issue.number }}"
          delete-branch: true

      - name: Comment on Issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🤖 Beep boop! I have automatically processed your request and created a Pull Request. Once a maintainer reviews and merges it, the change will go live!'
            });

      - name: Notify Discord
        id: discord_notify
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          MOD_NAME: ${{ steps.process.outputs.mod_name }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          PR_URL: ${{ steps.create_pr.outputs.pull-request-url }}
          ACTION: ${{ steps.process.outputs.action }}
        run: |
          COLOR=$([[ "$ACTION" == "removal" ]] && echo "16711680" || echo "16753920")
          ACTION_DESC=$([[ "$ACTION" == "removal" ]] && echo "Removal requested" || echo "Modification suggested")
          RESPONSE=$(curl -s -X POST "$DISCORD_WEBHOOK_URL?wait=true" \
            -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🔄 Mod Modification: $MOD_NAME\",
                \"description\": \"$ACTION_DESC for this map entry.\",
                \"color\": $COLOR,
                \"fields\": [
                  { \"name\": \"Issue\", \"value\": \"[#$ISSUE_NUMBER]($ISSUE_URL)\", \"inline\": true },
                  { \"name\": \"Pull Request\", \"value\": \"[Review PR]($PR_URL)\", \"inline\": true },
                  { \"name\": \"Status\", \"value\": \"⏳ Awaiting review\", \"inline\": false }
                ],
                \"footer\": { \"text\": \"NC Zoning Board\" }
              }]
            }")
          MESSAGE_ID=$(echo "$RESPONSE" | jq -r '.id')
          echo "message_id=$MESSAGE_ID" >> $GITHUB_OUTPUT

      - name: Store Discord Message ID on Issue
        uses: actions/github-script@v7
        with:
          script: |
            const messageId = '${{ steps.discord_notify.outputs.message_id }}';
            if (messageId && messageId !== 'null') {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `<!-- discord_message_id: ${messageId} -->`
              });
            }
