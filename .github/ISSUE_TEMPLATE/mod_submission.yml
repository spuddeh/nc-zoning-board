name: 📍 Submit a New Mod Location
description: Register your mod's coordinates on the NC Zoning Board — an interactive map showing where Cyberpunk 2077 location mods are in Night City.
labels: ["mod-submission"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for adding your mod to the NC Zoning Board! Please fill out the details below. Our bot will automatically verify your coordinates and generate a Pull Request to add your pin to the live map.
  - type: input
    id: mod_name
    attributes:
      label: Mod Name
      description: The exact title of your location mod.
      placeholder: "e.g., Modular Apartment Makeover - The Glen"
    validations:
      required: true
  - type: input
    id: author
    attributes:
      label: Author Alias(es)
      description: |
        The name(s) you want displayed. Multiple authors should be separated by commas.
        IMPORTANT: These must EXACTLY match your Nexus Mods username for profile linking to work.
      placeholder: "e.g., Spuddeh, Kaoziun"
    validations:
      required: true
  - type: input
    id: credits
    attributes:
      label: Credits
      description: Additional credits for teams, contributors, or assets (optional).
      placeholder: "e.g., CRF Team"
  - type: markdown
    attributes:
      value: |
        ### Getting Your Coordinates
        Coordinates must come from **Cyber Engine Tweaks (CET)** — do **not** use World Builder coordinates, as they may place your pin in the wrong location.

        **Option 1 — CET Console:**
        1. Stand at the location in-game
        2. Open the CET console (`~`)
        3. Run: `local p,r = GetPlayer():GetWorldPosition(), GetPlayer():GetWorldOrientation():ToEulerAngles(); print(string.format("x=%.4f  y=%.4f  z=%.4f  yaw=%.4f", p.x, p.y, p.z, r.yaw))`
        4. Note the **X**, **Y**, **Z**, and **Yaw** values from the output

        **Option 2 — Simple Location Manager:**
        Install [Simple Location Manager](https://www.nexusmods.com/cyberpunk2077/mods/26454), save the location, then read the X, Y, Z from the saved entry. The BBCode Generator modal on the NC Zoning Board website also has this command ready to copy.
  - type: input
    id: coord_x
    attributes:
      label: X Coordinate
      description: "The exact X coordinate from CET output (first value shown). \u26A0\uFE0F IMPORTANT: Include the minus sign (-) if the value is negative. CET output often contains negative numbers."
      placeholder: "e.g., -500"
    validations:
      required: true
  - type: input
    id: coord_y
    attributes:
      label: Y Coordinate
      description: "The exact Y coordinate from CET output (second value shown). \u26A0\uFE0F IMPORTANT: Include the minus sign (-) if the value is negative. CET output often contains negative numbers."
      placeholder: "e.g., -1200"
    validations:
      required: true
  - type: input
    id: coord_z
    attributes:
      label: Z Coordinate
      description: "The Z coordinate from CET output (height/elevation value). Include the minus sign (-) if negative."
      placeholder: "e.g., 42.5"
    validations:
      required: true
  - type: input
    id: yaw
    attributes:
      label: Yaw (Facing Direction)
      description: "Optional. The player facing direction in degrees from CET output (fourth value). Leave blank if not available."
      placeholder: "e.g., 180.0"
  - type: input
    id: nexus_link
    attributes:
      label: Nexus Mods Link
      description: |
        The full URL to your published mod page.
        If the mod isn't published yet, type 'WIP'. If submitting a test location, type 'Dummy'.
      placeholder: "https://www.nexusmods.com/cyberpunk2077/mods/... or WIP"
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: What type of location mod is this?
      options:
        - location-overhaul
        - new-location
        - other
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        **Tags** — check all that apply. At least one tag is recommended.
        > Style tags describe the aesthetic. Life-path tags describe who the mod suits. Utility tags describe the function.
  - type: checkboxes
    id: tags
    attributes:
      label: Tags
      options:
        - label: "apartment — A player housing unit within a megabuilding or high-rise"
        - label: "corpo — High-end corporate architecture and security-focused areas"
        - label: "entertainment — Bars, clubs, casinos, and nightlife venues"
        - label: "entropism — The poverty aesthetic of struggling against technology"
        - label: "house — A standalone player dwelling or safehouse"
        - label: "infrastructure — Roads, bridges, parking structures, and public works"
        - label: "kitsch — Flashy, bold, cheap — the look of a lost golden age"
        - label: "neokitsch — Synonymous with luxury and infinite wealth"
        - label: "neomilitarism — Cold, sharp, modern — ready for combat"
        - label: "nomad — Off-the-grid, scrapyard, desert, or vehicular habitats"
        - label: "photos — Scenic or atmospheric locations suited for virtual photography"
        - label: "quest — A location tied to custom gigs, missions, or storylines"
        - label: "shop — A retail location for weapons, clothing, or items"
        - label: "streetkid — Gang culture, neon lights, and urban survival"
  - type: textarea
    id: description
    attributes:
      label: Short Description
      description: A brief, 1-2 sentence summary of what your mod adds to this location.
      placeholder: "Custom synthwave aesthetic overhaul for the Glen apartment..."
    validations:
      required: true
